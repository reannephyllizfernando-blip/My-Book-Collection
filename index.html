<!DOCTYPE html>
<html>
<head>
  <title>My Book Collection</title>
  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #fff5f8; 
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px;
      color: #333;
    }

    h2 {
      margin-bottom: 30px;
      color: #ff4d80; 
      font-weight: 600;
      text-align: center;
    }

    input {
      padding: 10px 15px;
      margin-bottom: 15px;
      width: 250px;
      border: 1px solid #ffb3c6; 
      border-radius: 5px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #ff4d80;
    }

    button {
      padding: 10px 20px;
      margin-bottom: 20px;
      border: none;
      background-color: #ff4d80;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #ff1a5c;
    }

    ul {
      list-style: none;
      width: 300px;
    }

    li {
      background-color: #ffe6f0; 
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    li b {
      color: #ff4d80;
    }

    li button {
      margin-top: 10px;
      margin-right: 5px;
      padding: 5px 10px;
      font-size: 0.85rem;
      background-color: #ffb3c6;
      color: #333;
      border-radius: 5px;
    }

    li button:hover {
      background-color: #ff80a1;
      color: #fff;
    }

  </style>
</head>
<body>

<h2>My Book Collection</h2>

<input type="text" id="bookInput" placeholder="Book Title"><br>
<input type="text" id="authorInput" placeholder="Author"><br>
<button onclick="addBook()">Add Book</button>

<ul id="bookList"></ul>

<script>
document.addEventListener("DOMContentLoaded", displayBooks);

function getBooks(){ return JSON.parse(localStorage.getItem("books")) || []; }
function saveBooks(books){ localStorage.setItem("books", JSON.stringify(books)); }

function addBook(){
  const title = document.getElementById("bookInput").value;
  const author = document.getElementById("authorInput").value;
  if(title.trim() === "" || author.trim() === "") return;

  const books = getBooks();
  books.push({title, author});
  saveBooks(books);

  document.getElementById("bookInput").value = "";
  document.getElementById("authorInput").value = "";

  displayBooks();
}

function displayBooks(){
  const books = getBooks();
  const list = document.getElementById("bookList");
  list.innerHTML = "";

  books.forEach((book,index)=>{
    list.innerHTML += `
      <li>
        <b>${book.title}</b> by ${book.author}<br>
        <button onclick="editBook(${index})">Edit</button>
        <button onclick="deleteBook(${index})">Delete</button>
      </li>
    `;
  });
}

function deleteBook(index){
  const books = getBooks();
  books.splice(index,1);
  saveBooks(books);
  displayBooks();
}

function editBook(index){
  const books = getBooks();
  const newTitle = prompt("Edit Title:", books[index].title);
  const newAuthor = prompt("Edit Author:", books[index].author);
  if(newTitle && newAuthor){
    books[index].title = newTitle;
    books[index].author = newAuthor;
  }
  saveBooks(books);
  displayBooks();
}
</script>

</body>
</html>
